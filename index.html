<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxondle</title>

<style>
body {
  font-family: Inter, Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  justify-content: center;
}

.container {
  width: 600px;
  margin-top: 40px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  outline: none;
}

#results {
  background: #1e293b;
  border-radius: 8px;
  margin-top: 5px;
  max-height: 200px;
  overflow-y: auto;
}

.result {
  padding: 10px;
  cursor: pointer;
}

.result:hover, .active {
  background: #334155;
}

.highlight {
  color: #38bdf8;
  font-weight: bold;
}

.section {
  margin-top: 25px;
}

.tag {
  display: inline-block;
  background: #1e40af;
  padding: 6px 10px;
  border-radius: 6px;
  margin: 4px;
}
</style>
</head>

<body>
<div class="container">

<h2>Taxondle</h2>
<input id="search" placeholder="Search animal..." autocomplete="off" />
<div id="results"></div>

<div class="section">
  <h3>Valid Taxonomic Groups</h3>
  <div id="orders"></div>
</div>

</div>

<script>
let animals = [];
let currentTaxon = null;
let selectedIndex = -1;

fetch('animals.json').then(r => r.json()).then(d => animals = d);

const input = document.getElementById('search');
const results = document.getElementById('results');

function highlight(text, query) {
  const i = text.toLowerCase().indexOf(query);
  if (i === -1) return text;
  return text.slice(0, i) + '<span class="highlight">' +
         text.slice(i, i + query.length) + '</span>' +
         text.slice(i + query.length);
}

input.addEventListener('input', () => {
  const q = input.value.toLowerCase().trim();
  results.innerHTML = '';
  selectedIndex = -1;

  if (!q) return;

  let matches = animals.filter(a =>
    a.common_name.toLowerCase().startsWith(q) ||
    a.scientific_name.toLowerCase().startsWith(q)
  );

  if (matches.length === 0) {
    matches = animals.filter(a =>
      a.common_name.toLowerCase().includes(q) ||
      a.scientific_name.toLowerCase().includes(q)
    );
  }

  matches.slice(0, 25).forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'result';
    div.innerHTML = `${highlight(a.common_name, q)} (${highlight(a.scientific_name, q)})`;

    div.onclick = () => selectAnimal(a);
    results.appendChild(div);
  });
});

input.addEventListener('keydown', (e) => {
  const items = document.querySelectorAll('.result');

  if (e.key === 'ArrowDown') {
    selectedIndex = (selectedIndex + 1) % items.length;
  } else if (e.key === 'ArrowUp') {
    selectedIndex = (selectedIndex - 1 + items.length) % items.length;
  } else if (e.key === 'Enter' && items[selectedIndex]) {
    items[selectedIndex].click();
  }

  items.forEach((el, i) => {
    el.classList.toggle('active', i === selectedIndex);
  });
});

function selectAnimal(a) {
  input.value = a.common_name;
  results.innerHTML = '';
  updateTaxon(a);
  updateOrders();
}

function updateTaxon(a) {
  if (!currentTaxon) {
    currentTaxon = a.taxonomy[a.taxonomy.length - 1];
    return;
  }

  for (let t of a.taxonomy) {
    if (t === currentTaxon) {
      currentTaxon = t;
    }
  }
}

function updateOrders() {
  const container = document.getElementById('orders');
  container.innerHTML = '';

  if (!currentTaxon) return;

  const filtered = animals.filter(a =>
    a.taxonomy.includes(currentTaxon)
  );

  const orders = [...new Set(filtered.map(a => a.order))];

  orders.forEach(o => {
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.textContent = o;
    container.appendChild(tag);
  });
}

</script>

</body>
</html>
