<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxon — The Animal Classification Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* keep all your existing CSS intact */
.autocomplete-list {
  max-height: 220px;
  overflow-y: auto;
}
</style>
</head>
<body>
<div class="page-wrap">

  <!-- Keep existing header/game layout -->

  <div class="search-wrap">
    <input id="search" class="search-input" placeholder="Search animal..." autocomplete="off">
    <button id="guess-btn" class="guess-btn">Guess</button>
    <div id="autocomplete" class="autocomplete-list"></div>
  </div>

  <div id="orders-panel" class="panel">
    <div class="panel-title">Suggested Orders</div>
    <div id="orders" class="tax-row"></div>
  </div>

</div>

<script>
let animals = [];
let correctPath = []; // Most specific correct taxon
let targetAnimal = null; // your game sets this elsewhere
const searchInput = document.getElementById("search");
const autocomplete = document.getElementById("autocomplete");
const ordersDiv = document.getElementById("orders");

// Load animals.json
fetch('animals.json')
  .then(r => r.json())
  .then(data => animals = data);

// Search logic: prefix-only, scrollable dropdown
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  autocomplete.innerHTML = '';
  if(!q) return;

  const matches = animals.filter(a =>
    a.common_name.toLowerCase().startsWith(q) ||
    a.scientific_name.toLowerCase().startsWith(q)
  ).slice(0,25);

  matches.forEach(a => {
    const div = document.createElement('div');
    div.className = 'autocomplete-item';
    div.textContent = `${a.common_name} (${a.scientific_name})`;
    div.onclick = () => selectAnimal(a);
    autocomplete.appendChild(div);
  });

  autocomplete.classList.toggle('open', matches.length > 0);
});

function selectAnimal(animal) {
  searchInput.value = animal.common_name;
  autocomplete.innerHTML = '';
  updateCorrectPath(animal);
  updateOrders();
}

// Track deepest correct taxon (your existing green/red logic can keep marking)
function updateCorrectPath(animal) {
  if(!targetAnimal) return;
  correctPath = [];
  const levels = ["kingdom","phylum","class","order","family","genus","species"];
  for(let i=0;i<levels.length;i++){
    if(animal[levels[i]] && targetAnimal[levels[i]] &&
       animal[levels[i]] === targetAnimal[levels[i]]){
      correctPath.push(animal[levels[i]]);
    } else break;
  }
}

// Filter orders/families based on current correct path
function updateOrders() {
  ordersDiv.innerHTML = '';
  if(correctPath.length===0) return;
  const filtered = animals.filter(a => {
    const levels = ["kingdom","phylum","class","order","family","genus","species"];
    for(let i=0;i<correctPath.length;i++){
      if(a[levels[i]] !== correctPath[i]) return false;
    }
    return true;
  });
  const uniqueOrders = [...new Set(filtered.map(a=>a.order))];
  uniqueOrders.forEach(order=>{
    const chip = document.createElement('div');
    chip.className = 'tax-chip';
    chip.textContent = order;
    ordersDiv.appendChild(chip);
  });
}
</script>
</body>
</html>
